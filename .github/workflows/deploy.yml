name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: Force deploy even if no tracked file changes were detected
        required: false
        default: true
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  # ── Detect what changed ────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra:           ${{ steps.filter.outputs.infra }}
      backend:         ${{ steps.filter.outputs.backend }}
      frontend:        ${{ steps.filter.outputs.frontend }}
      tma:             ${{ steps.filter.outputs.tma }}
      build_required:  ${{ steps.summary.outputs.build_required }}
      deploy_required: ${{ steps.summary.outputs.deploy_required }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            infra:
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'requirements.txt'
              - '.dockerignore'
            backend:
              - 'api/**'
              - 'tgbot/**'
              - 'db/**'
              - 'utils/**'
            frontend:
              - 'frontend/**'
            tma:
              - 'tma/**'

      - name: Summarize deployment scope
        id: summary
        run: |
          set -eu

          FORCE="${{ github.event_name == 'workflow_dispatch' && inputs.force_deploy }}"

          BUILD_REQUIRED=false
          DEPLOY_REQUIRED=false

          if [ "${{ steps.filter.outputs.infra }}"     = "true" ] || \
             [ "${{ steps.filter.outputs.backend }}"   = "true" ] || \
             [ "${{ steps.filter.outputs.frontend }}"  = "true" ] || \
             [ "${{ steps.filter.outputs.tma }}"       = "true" ]; then
            BUILD_REQUIRED=true
            DEPLOY_REQUIRED=true
          fi

          if [ "$FORCE" = "true" ]; then
            BUILD_REQUIRED=true
            DEPLOY_REQUIRED=true
          fi

          echo "build_required=$BUILD_REQUIRED"   >> "$GITHUB_OUTPUT"
          echo "deploy_required=$DEPLOY_REQUIRED" >> "$GITHUB_OUTPUT"

  # ── Type-check & lint ──────────────────────────────────────────────────────
  check:
    name: Lint & Tests
    runs-on: ubuntu-latest
    needs: changes

    env:
      PANEL_PASSWORD: ci_test_secret
      ROOT_FOLDER:    "."
      BOT_API_KEY:    ""
      ADMIN_ID:       "0"

    steps:
      - uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      # ── Admin frontend ───────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            tma/package-lock.json

      - name: Install frontend deps
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        run: npm ci
        working-directory: frontend

      - name: TypeScript check (frontend)
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        run: npx tsc --noEmit
        working-directory: frontend

      - name: ESLint (frontend)
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        run: npm run lint
        working-directory: frontend

      # ── TMA frontend ─────────────────────────────────────────────────────────
      - name: Install TMA deps
        if: needs.changes.outputs.tma == 'true' || needs.changes.outputs.infra == 'true'
        run: npm ci
        working-directory: tma

      - name: TypeScript check (tma)
        if: needs.changes.outputs.tma == 'true' || needs.changes.outputs.infra == 'true'
        run: npx tsc --noEmit
        working-directory: tma

  # ── Build & push Docker image ──────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [changes, check]
    if: needs.changes.outputs.build_required == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Deploy via SSH ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [changes, check, build]
    if: needs.changes.outputs.deploy_required == 'true'

    steps:
      - name: Set image name
        run: |
          echo "GHCR_IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          envs:     GHCR_IMAGE
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"

            git fetch origin master
            git checkout master
            git reset --hard origin/master

            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            GHCR_IMAGE="$GHCR_IMAGE" \
              docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            GHCR_IMAGE="$GHCR_IMAGE" \
              docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --remove-orphans

            docker image prune -f --filter "until=24h"

            echo "Deploy complete: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

  # ── Notify on failure ──────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [check, build, deploy]
    if: failure()

    steps:
      - name: Send Telegram notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.NOTIFY_TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.NOTIFY_TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>Deploy failed</b>%0A%0ARepo: <code>${{ github.repository }}</code>%0ABranch: <code>${{ github.ref_name }}</code>%0ACommit: <code>${{ github.sha }}</code>%0A%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View run</a>"
